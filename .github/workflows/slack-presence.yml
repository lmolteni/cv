name: Slack Presence

on:
  schedule:
    - cron: '*/8 10-23 * * 1-5'
    - cron: '4-59/8 10-23 * * 1-5'
    - cron: '22 13 * * 1-5'
  workflow_dispatch:

jobs:
  keep-active:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run presence script
        env:
          SLACK_USER_TOKEN: ${{ secrets.SLACK_USER_TOKEN }}
          GOOGLE_CALENDAR_KEY: ${{ secrets.GOOGLE_CALENDAR_KEY }}
          NOTIFY_EMAIL: lmslackstatus@gmail.com
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 << 'EOF'
          import os, requests, smtplib, datetime, random
          from email.mime.text import MIMEText

          # ── Tiempo ───────────────────────────────────────────────────────────
          now_art = datetime.datetime.now(datetime.timezone.utc).replace(tzinfo=None) \
                    - datetime.timedelta(hours=3)
          hour      = now_art.hour
          minute    = now_art.minute
          total_min = hour * 60 + minute
          date_str  = now_art.strftime("%Y-%m-%d")
          tomorrow  = (now_art + datetime.timedelta(days=1)).strftime("%Y-%m-%d")
          timestamp = now_art.strftime("%Y-%m-%d %H:%M ART")

          TOKEN      = os.environ["SLACK_USER_TOKEN"]
          GCAL_KEY   = os.environ["GOOGLE_CALENDAR_KEY"]
          NOTIFY     = os.environ["NOTIFY_EMAIL"]
          GMAIL_USER = os.environ["GMAIL_USER"]
          GMAIL_PASS = os.environ["GMAIL_APP_PASSWORD"]

          # ── Email helper ──────────────────────────────────────────────────────
          def send_email(subject, body):
              msg = MIMEText(body)
              msg["Subject"] = subject
              msg["From"]    = GMAIL_USER
              msg["To"]      = NOTIFY
              with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
                  s.login(GMAIL_USER, GMAIL_PASS)
                  s.send_message(msg)

          # ── Leer override.txt ─────────────────────────────────────────────────
          force_on  = []
          force_off = []
          if os.path.exists("override.txt"):
              with open("override.txt") as f:
                  for line in f:
                      line = line.strip()
                      if line.startswith("+"):
                          force_on.append(line[1:])
                      elif line.startswith("-"):
                          force_off.append(line[1:])

          # ── Google Calendar: feriado? ─────────────────────────────────────────
          def is_holiday(check_date):
              cal_id = "es.ar.official#holiday@group.v.calendar.google.com"
              url = (
                  f"https://www.googleapis.com/calendar/v3/calendars/"
                  f"{requests.utils.quote(cal_id)}/events"
                  f"?key={GCAL_KEY}"
                  f"&timeMin={check_date}T00:00:00Z"
                  f"&timeMax={check_date}T23:59:59Z"
                  f"&singleEvents=true"
              )
              r = requests.get(url).json()
              events = r.get("items", [])
              return events, len(events) > 0

          # ── Holiday check día siguiente (cron 10:22 ART) ──────────────────────
          if 10*60+22 <= total_min <= 10*60+29:
              events, holiday_tomorrow = is_holiday(tomorrow)
              if holiday_tomorrow and tomorrow not in force_on:
                  name = events[0].get("summary", "Feriado")
                  send_email(
                      f"🇦🇷 Feriado mañana {tomorrow} – Slack no se conectará",
                      f"Mañana es feriado en Argentina: {name}.\n\n"
                      f"El script NO va a setear presencia.\n\n"
                      f"Si querés conectarte igual, agregá +{tomorrow} en override.txt del repo."
                  )
                  print(f"Email feriado enviado: {name} ({tomorrow})")
              else:
                  print(f"Mañana {tomorrow}: no es feriado o está en force_on")

          # ── Force off (ej: Felipe enfermo) ────────────────────────────────────
          if date_str in force_off:
              print(f"Fecha en force_off ({date_str}), no se conecta")
              exit(0)

          # ── Feriado hoy ───────────────────────────────────────────────────────
          _, holiday_today = is_holiday(date_str)
          if holiday_today and date_str not in force_on:
              print(f"Feriado hoy ({date_str}), salteando")
              exit(0)

          # ── Ventana horaria random (seed por fecha) ───────────────────────────
          random.seed(date_str + "start")
          start_min = random.randint(8*60+42, 9*60+13)
          random.seed(date_str + "end")
          end_min   = random.randint(18*60+19, 19*60+21)

          start_fmt = f"{start_min//60:02d}:{start_min%60:02d}"
          end_fmt   = f"{end_min//60:02d}:{end_min%60:02d}"

          # ── Email online (primera ejecución dentro de ventana) ────────────────
          if start_min <= total_min <= start_min + 8:
              send_email(
                  f"🟢 Slack online – {timestamp}",
                  f"El script activó la presencia en Slack.\n"
                  f"Ventana de hoy: {start_fmt} – {end_fmt} ART"
              )
              print(f"Email online enviado ({timestamp})")

          # ── Email offline (primera ejecución fuera de ventana al final) ───────
          if end_min < total_min <= end_min + 8:
              send_email(
                  f"🔴 Slack offline – {timestamp}",
                  f"El script dejó de setear presencia.\n"
                  f"Ventana de hoy: {start_fmt} – {end_fmt} ART"
              )
              print(f"Email offline enviado ({timestamp})")

          # ── Fuera de ventana ──────────────────────────────────────────────────
          if total_min < start_min or total_min > end_min:
              print(f"Fuera de ventana ({hour:02d}:{minute:02d} ART, ventana {start_fmt}–{end_fmt})")
              exit(0)

          # ── Chequear ausente manual ───────────────────────────────────────────
          presence_r = requests.get(
              "https://slack.com/api/users.getPresence",
              headers={"Authorization": f"Bearer {TOKEN}"}
          ).json()

          if not presence_r.get("ok"):
              print(f"Error obteniendo presencia: {presence_r}")
              exit(1)

          if presence_r.get("manual_away", False):
              print("Usuario ausente manualmente, no se modifica presencia")
              exit(0)

          # ── Setear presencia ──────────────────────────────────────────────────
          r = requests.post(
              "https://slack.com/api/users.setPresence",
              headers={"Authorization": f"Bearer {TOKEN}"},
              json={"presence": "auto"}
          ).json()

          if r.get("ok"):
              print(f"Presencia actualizada OK ({hour:02d}:{minute:02d} ART)")
          else:
              print(f"Error: {r}")
              exit(1)
          EOF
